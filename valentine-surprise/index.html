<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Valentine Ruchi ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary: #ff4d6d;
            --bg-gradient: linear-gradient(135deg, #fff0f3 0%, #ffe5ec 100%);
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 30px rgba(255, 77, 109, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND HEARTS --- */
        .bg-hearts {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0; /* Behind everything */
            overflow: hidden;
        }
        
        .heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.2);
            animation: float 15s infinite linear;
            top: 100%; /* Start below screen */
        }

        @keyframes float {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
        }

        /* --- CARD STYLING --- */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 90%;
            width: 450px;
            z-index: 10;
            transition: transform 0.3s ease, opacity 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        p { color: #666; font-size: 1.2rem; margin-bottom: 2rem; }

        .img-container {
            width: 100%;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .img-container img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 15px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        /* --- BUTTONS --- */
        .btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 5px 20px rgba(255, 77, 109, 0.4); }
        .btn-primary:hover { transform: scale(1.05); background: #e03e5d; }

        .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 20px; position: relative; height: 60px; }
        .btn-yes { background: #2ecc71; color: white; z-index: 5; }
        .btn-no { background: var(--primary); color: white; position: absolute; right: 20px; transition: all 0.1s ease; }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="bg-music.mp3" type="audio/mpeg">
    </audio>
    <audio id="successMusic">
        <source src="yes-music.mp3" type="audio/mpeg">
    </audio>

    <div class="bg-hearts" id="heartsContainer"></div>

    <div id="page1" class="card fade-in">
        <h1>Hello Ruchi ❤️</h1>
        <div class="img-container">
            <img src="https://c.tenor.com/t1rg0boMk6sAAAAC/tenor.gif" alt="Cute Bear">
        </div>
        <p>I have a surprise for you...</p>
        <button class="btn btn-primary" onclick="goToProposal()">Open Surprise ✨</button>
    </div>

    <div id="page2" class="card hidden">
        <h1>Will you be my Valentine?</h1>
        <div class="img-container">
            <img src="https://c.tenor.com/mmsvp_XJVVwAAAAC/tenor.gif" alt="Please say yes">
        </div>
        
        <div class="btn-group">
            <button class="btn btn-yes" id="yesBtn" onclick="acceptLove()">YES!</button>
            <button class="btn btn-no" id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">No</button>
        </div>
    </div>

    <div id="page3" class="card hidden">
        <h1>YAY! I Love You! 💖</h1>
        <div class="img-container">
            <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" alt="Kisses">
        </div>
        <p>Best decision ever! See you on Feb 14th! 😘</p>
    </div>

    <script>
        // --- SETUP ---
        const music = document.getElementById('bgMusic');
        const successMusic = document.getElementById('successMusic');
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const heartsContainer = document.getElementById('heartsContainer');

        // --- NAVIGATION ---
        function goToProposal() {
            music.volume = 0.5;
            music.play().catch(e => console.log("Audio play failed (user didn't interact yet)"));
            
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
            document.getElementById('page2').classList.add('fade-in');
        }

        // --- BUTTON PHYSICS ---
        function moveButton() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            // Random position within screen bounds
            const newX = Math.random() * (width - btnWidth - 5);
            const newY = Math.random() * (height - btnHeight - 5);

            noBtn.style.position = 'fixed';
            noBtn.style.left = `${newX}px`;
            noBtn.style.top = `${newY}px`;

            // Grow YES button
            // Gradually increase the YES button size but cap at scale 2.5
            // let currentScale = parseFloat(yesBtn.style.transform.replace('scale(', '')) || 1;
            // if(currentScale < 2.5) {
            //     yesBtn.style.transform = `scale(${currentScale + 0.1})`;
            // }
        }

        // --- SUCCESS HANDLER ---
        function acceptLove() {
            // Fade out BG music
            let fadeInterval = setInterval(() => {
                if(music.volume > 0.1) {
                    music.volume -= 0.1;
                } else {
                    music.pause();
                    clearInterval(fadeInterval);
                }
            }, 100);

            // Play Success music
            successMusic.volume = 1.0;
            successMusic.currentTime = 0;
            successMusic.play();

            document.getElementById('page2').classList.add('hidden');
            document.getElementById('page3').classList.remove('hidden');
            document.getElementById('page3').classList.add('fade-in');
            
            triggerConfetti();
        }

        // --- VISUAL EFFECTS ---
        function triggerConfetti() {
            const duration = 3000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: 0.1, y: 0.6 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: 0.9, y: 0.6 } }));
            }, 250);
        }

        // --- BACKGROUND HEARTS LOOP ---
        // This function now safely checks if the container exists
        function createHearts() {
            if (!heartsContainer) return; // Safety check!

            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart');
            
            // Randomize position and animation speed
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 6) + 's'; 
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            
            heartsContainer.appendChild(heart);

            // Remove heart after animation to keep browser fast
            setTimeout(() => {
                heart.remove();
            }, 11000);
        }

        // Start the hearts loop
        setInterval(createHearts, 600);

    </script>
</body>
</html>
